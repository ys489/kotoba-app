<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SpeakNow</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.12);
  --text:#f0f4ff;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.25);
  --blue:#4d9fff;--green:#3ecf8e;--amber:#f5a623;--red:#ff6b6b;--purple:#a78bfa;
}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;transition:all 0.15s}
*{-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}

/* ===== HOME ===== */
#screen-home{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:32px 20px;text-align:center;
  background:radial-gradient(ellipse at 50% 0%, rgba(77,159,255,0.15) 0%, transparent 70%);
}
.logo-wrap{margin-bottom:20px}
.logo-icon{font-size:52px;display:block;margin-bottom:8px}
.app-name{font-size:28px;font-weight:800;letter-spacing:-0.03em;
  background:linear-gradient(135deg,#4d9fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.app-tagline{font-size:13px;color:var(--text2);margin-top:4px}

.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:420px;margin:24px 0 20px}
.sc-btn{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 10px;text-align:left;color:var(--text);transition:all 0.15s;
}
.sc-btn:hover,.sc-btn.sel{border-color:var(--blue);background:rgba(77,159,255,0.1)}
.sc-btn.sel{box-shadow:0 0 0 1px var(--blue)}
.sc-emoji{font-size:24px;display:block;margin-bottom:6px}
.sc-name{font-size:13px;font-weight:600;margin-bottom:2px}
.sc-hint{font-size:10px;color:var(--text2);line-height:1.3}

.go-btn{
  width:100%;max-width:420px;padding:15px;border-radius:50px;
  background:linear-gradient(135deg,#1a5fff,#4d9fff);color:#fff;
  font-size:15px;font-weight:700;letter-spacing:0.02em;
  box-shadow:0 8px 32px rgba(77,159,255,0.35);
}
.go-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(77,159,255,0.45)}
.go-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}

/* ===== CONVERSATION ===== */
#screen-conv{display:none;position:relative;height:100vh;overflow:hidden}
#screen-conv.active{display:block}

/* 背景イラスト */
.scene-bg{
  position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:center;
  transition:opacity 0.5s;
}
.scene-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(10,14,26,0.3) 0%,rgba(10,14,26,0.7) 60%,rgba(10,14,26,0.95) 100%)}

/* ヘッダー */
.conv-header{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top)) 16px 14px;
}
.conv-sc-label{display:flex;align-items:center;gap:8px}
.conv-sc-icon{font-size:20px}
.conv-sc-name{font-size:14px;font-weight:600;color:#fff}
.conv-timer{font-size:22px;font-weight:700;color:var(--blue);font-variant-numeric:tabular-nums;
  background:rgba(77,159,255,0.12);border:1px solid rgba(77,159,255,0.25);
  padding:4px 12px;border-radius:20px;}
.conv-timer.ready{color:var(--green);border-color:rgba(62,207,142,0.3);background:rgba(62,207,142,0.1)}

/* AIバブル（タップで表示） */
.ai-bubble-wrap{
  position:absolute;top:72px;left:0;right:0;z-index:10;
  padding:0 16px;
  transition:all 0.3s;
}
.ai-bubble{
  background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.15);border-radius:16px;
  padding:12px 16px;max-width:520px;margin:0 auto;
  position:relative;cursor:pointer;
}
.ai-bubble-text{font-size:14px;line-height:1.6;color:#fff;display:none}
.ai-bubble-text.show{display:block}
.ai-bubble-tap{font-size:12px;color:var(--text2);text-align:center}
.ai-bubble-tap.hide{display:none}
.ai-role{font-size:10px;color:var(--blue);font-weight:600;margin-bottom:4px}

/* ユーザー発話 */
.user-bubble-wrap{
  position:absolute;right:16px;z-index:10;
  max-width:70%;
}
.user-bubble{
  background:var(--blue);color:#fff;border-radius:16px 16px 4px 16px;
  padding:10px 14px;font-size:14px;line-height:1.5;
  animation:slide-in 0.2s ease-out;
}
@keyframes slide-in{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}

/* 中央ステータス */
.center-status{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:10;text-align:center;pointer-events:none;
}
.status-icon{font-size:48px;margin-bottom:8px;display:block}
.status-text{font-size:14px;color:var(--text2)}

/* 判定バー */
.judge-bar{
  position:absolute;bottom:130px;left:16px;right:16px;z-index:10;
  background:rgba(62,207,142,0.12);backdrop-filter:blur(8px);
  border:1px solid rgba(62,207,142,0.3);border-radius:12px;
  padding:10px 14px;display:none;text-align:center;
}
.judge-bar.show{display:block;animation:slide-up 0.3s ease-out}
@keyframes slide-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.judge-bar-text{font-size:12px;color:var(--green);margin-bottom:6px}
.judge-btn{background:var(--green);color:#fff;padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600}

/* フッター */
.conv-footer{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  padding:12px 16px calc(16px + env(safe-area-inset-bottom));
  background:linear-gradient(to top,rgba(10,14,26,0.95),transparent);
}
.mic-row{display:flex;align-items:center;gap:12px}
.mic-orb{
  width:60px;height:60px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  border:2px solid var(--border);background:var(--surface);
  transition:all 0.3s;
}
.mic-orb.listening{
  border-color:var(--green);background:rgba(62,207,142,0.15);
  box-shadow:0 0 0 6px rgba(62,207,142,0.1),0 0 24px rgba(62,207,142,0.3);
  animation:orb-pulse 1.2s infinite;
}
.mic-orb.speaking{border-color:var(--blue);background:rgba(77,159,255,0.12)}
.mic-orb.thinking{border-color:var(--amber);background:rgba(245,166,35,0.1)}
@keyframes orb-pulse{0%,100%{box-shadow:0 0 0 6px rgba(62,207,142,0.1),0 0 24px rgba(62,207,142,0.3)}50%{box-shadow:0 0 0 10px rgba(62,207,142,0.05),0 0 32px rgba(62,207,142,0.4)}}
.mic-info{flex:1}
.mic-main{font-size:13px;color:var(--text);margin-bottom:2px}
.mic-wave{display:flex;gap:2px;align-items:center;height:16px;opacity:0;transition:opacity 0.2s}
.mic-wave.show{opacity:1}
.mw{width:3px;border-radius:2px;background:var(--green);transition:height 0.07s}
.end-btn-sm{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;backdrop-filter:blur(8px)}
.end-btn-sm:hover{border-color:var(--red);color:var(--red)}

/* ===== REPORT ===== */
#screen-report{display:none;min-height:100vh;overflow-y:auto;padding:24px 16px 48px;max-width:560px;margin:0 auto}
#screen-report.active{display:block}
.rpt-header{text-align:center;margin-bottom:24px;padding-top:20px}
.rpt-emoji{font-size:48px;margin-bottom:8px}
.rpt-title{font-size:22px;font-weight:700;margin-bottom:4px}
.rpt-meta{font-size:13px;color:var(--text2)}
.total-card{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:22px;text-align:center;margin-bottom:14px;
  background:linear-gradient(135deg,rgba(77,159,255,0.08),rgba(167,139,250,0.08));
}
.total-num{font-size:60px;font-weight:800;line-height:1;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.total-label{font-size:12px;color:var(--text2);margin-top:4px}
.total-summary{font-size:13px;color:var(--text);margin-top:12px;line-height:1.7;text-align:left}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.score-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
.si-label{font-size:10px;color:var(--text2);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px}
.si-bar{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-bottom:6px}
.si-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(0.34,1.2,0.64,1)}
.si-num{font-size:20px;font-weight:700}
.si-detail{font-size:11px;color:var(--text2);margin-top:6px;line-height:1.5}
.fb-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.fb-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.05em;margin-bottom:8px}
.fb-item{font-size:12px;color:var(--text);padding:8px 10px;border-radius:8px;margin-bottom:6px;line-height:1.6;border-left:3px solid var(--border)}
.fb-item.g{border-left-color:var(--green);background:rgba(62,207,142,0.06)}
.fb-item.i{border-left-color:var(--amber);background:rgba(245,166,35,0.06)}
.rpt-btns{display:flex;gap:10px;margin-top:20px}
.btn-r{flex:1;padding:13px;border-radius:50px;font-size:14px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.btn-r:hover{border-color:var(--blue);color:var(--blue)}
.btn-g{flex:1;padding:13px;border-radius:50px;font-size:14px;font-weight:700;background:linear-gradient(135deg,#1a5fff,#4d9fff);color:#fff}
.loading-rpt{text-align:center;padding:60px 20px;color:var(--text2)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:360px){.sc-grid{grid-template-columns:1fr}.score-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home">
  <div class="logo-wrap">
    <span class="logo-icon">🗣️</span>
    <div class="app-name">SpeakNow</div>
    <div class="app-tagline">躊躇なく英語を話せるようになろう</div>
  </div>
  <div class="sc-grid" id="sc-grid"></div>
  <button class="go-btn" id="go-btn" onclick="startConv()" disabled>シナリオを選んでください</button>
</div>

<!-- CONVERSATION -->
<div id="screen-conv">
  <!-- 背景 -->
  <div class="scene-bg" id="scene-bg"></div>
  <div class="scene-overlay"></div>

  <!-- ヘッダー -->
  <div class="conv-header">
    <div class="conv-sc-label">
      <span class="conv-sc-icon" id="conv-icon"></span>
      <span class="conv-sc-name" id="conv-name"></span>
    </div>
    <div class="conv-timer" id="conv-timer">0:00</div>
  </div>

  <!-- AIバブル（タップで文字表示） -->
  <div class="ai-bubble-wrap" id="ai-bubble-wrap" style="display:none" onclick="toggleAIText()">
    <div class="ai-bubble">
      <div class="ai-role" id="ai-role"></div>
      <div class="ai-bubble-tap" id="ai-tap-hint">👆 タップで字幕表示</div>
      <div class="ai-bubble-text" id="ai-text"></div>
    </div>
  </div>

  <!-- ユーザー発話 -->
  <div class="user-bubble-wrap" id="user-bubble-wrap" style="display:none;bottom:140px">
    <div class="user-bubble" id="user-bubble"></div>
  </div>

  <!-- 中央ステータス -->
  <div class="center-status" id="center-status">
    <span class="status-icon" id="status-icon">🎙</span>
    <div class="status-text" id="status-text">準備中...</div>
  </div>

  <!-- 判定バー -->
  <div class="judge-bar" id="judge-bar">
    <div class="judge-bar-text">✨ 1分突破！いつでも判定できます</div>
    <button class="judge-btn" onclick="endConv()">📊 判定する</button>
  </div>

  <!-- フッター -->
  <div class="conv-footer">
    <div class="mic-row">
      <div class="mic-orb" id="mic-orb">🎙</div>
      <div class="mic-info">
        <div class="mic-main" id="mic-main">AIが話しかけます...</div>
        <div class="mic-wave" id="mic-wave">
          <div class="mw" id="mw1" style="height:5px"></div>
          <div class="mw" id="mw2" style="height:9px"></div>
          <div class="mw" id="mw3" style="height:13px"></div>
          <div class="mw" id="mw4" style="height:7px"></div>
          <div class="mw" id="mw5" style="height:11px"></div>
          <div class="mw" id="mw6" style="height:5px"></div>
        </div>
      </div>
      <button class="end-btn-sm" onclick="endConv()">終了</button>
    </div>
  </div>
</div>

<!-- REPORT -->
<div id="screen-report">
  <div id="report-inner"></div>
</div>

<script>
// ========================
// シナリオ
// ========================
const SCENARIOS = [
  {id:'cafe',   icon:'☕', name:'At the Café',
   hint:'ロンドンのカフェで注文',
   role:'barista',
   bg:'linear-gradient(135deg,#1a0e05 0%,#3d1f0a 40%,#2d1505 100%)',
   situation:'You are a friendly barista at The Daily Grind, a cozy café in London. A customer just walked in.',
   starter:"Good morning! Welcome to The Daily Grind. What can I get started for you today?"},
  {id:'hotel',  icon:'🏨', name:'Hotel Check-in',
   hint:'NYのホテルでチェックイン',
   role:'receptionist',
   bg:'linear-gradient(135deg,#05101a 0%,#0a2040 40%,#051020 100%)',
   situation:'You are a professional receptionist at The Grand Hotel in New York. A guest is arriving.',
   starter:"Good evening! Welcome to The Grand Hotel. May I have your name for the reservation?"},
  {id:'street', icon:'🗺️', name:'Lost in the City',
   hint:'道に迷って道を聞く',
   role:'local',
   bg:'linear-gradient(135deg,#0a1505 0%,#1a3010 40%,#0d1a08 100%)',
   situation:'You are a friendly local in central London. A tourist approaches you looking lost.',
   starter:"Hey, you look a bit lost! Where are you trying to get to? I can help!"},
  {id:'rest',   icon:'🍽️', name:'Restaurant',
   hint:'レストランで食事全体',
   role:'waiter',
   bg:'linear-gradient(135deg,#1a0510 0%,#350d20 40%,#1a0510 100%)',
   situation:'You are an experienced waiter at a nice American restaurant. A customer is seated at your table.',
   starter:"Good evening! I'm Alex and I'll be taking care of you tonight. Can I start you off with something to drink?"},
  {id:'job',    icon:'💼', name:'Job Interview',
   hint:'英語で就職面接',
   role:'interviewer',
   bg:'linear-gradient(135deg,#050a1a 0%,#0d1535 40%,#050a1a 100%)',
   situation:'You are an HR manager at an international tech company conducting a job interview.',
   starter:"Thank you for coming in today. Please have a seat. So, tell me about yourself and what brings you to apply for this role."},
  {id:'free',   icon:'🎤', name:'Free Talk',
   hint:'自由に何でも話す',
   role:'friend',
   bg:'linear-gradient(135deg,#0a0515 0%,#1a0d30 40%,#0a0515 100%)',
   situation:'You are a friendly native English speaker who loves having interesting conversations about anything.',
   starter:"Hey! Great to meet you. I love chatting with people. What's been on your mind lately?"},
];

// ========================
// STATE
// ========================
let S = {
  sc:null, history:[], timerSec:0, timerInt:null,
  isRec:false, isTTS:false, rec:null, wt:null, silTimer:null,
  active:false, voices:[], voice:null, ttsTimer:null,
};

// ========================
// HOME
// ========================
function buildHome(){
  const grid = document.getElementById('sc-grid');
  SCENARIOS.forEach(sc=>{
    const btn = document.createElement('button');
    btn.className='sc-btn';
    btn.innerHTML=`<span class="sc-emoji">${sc.icon}</span><div class="sc-name">${sc.name}</div><div class="sc-hint">${sc.hint}</div>`;
    btn.onclick=()=>{
      document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      S.sc=sc;
      const gb=document.getElementById('go-btn');
      gb.disabled=false;gb.textContent=`${sc.icon} ${sc.name} を始める →`;
    };
    grid.appendChild(btn);
  });
}

// ========================
// START
// ========================
async function startConv(){
  if(!S.sc) return;
  S.history=[];S.timerSec=0;S.active=true;
  showScreen('screen-conv');

  // 背景
  document.getElementById('scene-bg').style.background=S.sc.bg;
  document.getElementById('conv-icon').textContent=S.sc.icon;
  document.getElementById('conv-name').textContent=S.sc.name;
  document.getElementById('ai-role').textContent=S.sc.role;
  document.getElementById('ai-bubble-wrap').style.display='none';
  document.getElementById('user-bubble-wrap').style.display='none';
  document.getElementById('judge-bar').classList.remove('show');
  document.getElementById('conv-timer').classList.remove('ready');
  setOrb('idle');
  setStatusCenter('🎙','準備中...');

  // マイク許可
  await getMic();

  // タイマー
  clearInterval(S.timerInt);
  S.timerInt=setInterval(()=>{
    S.timerSec++;
    const m=Math.floor(S.timerSec/60),s=S.timerSec%60;
    document.getElementById('conv-timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    if(S.timerSec===60){
      document.getElementById('judge-bar').classList.add('show');
      document.getElementById('conv-timer').classList.add('ready');
    }
  },1000);

  // AI最初のセリフ
  speakAI(S.sc.starter);
}

// ========================
// TTS（タイムアウト保険付き）
// ========================
function speakAI(text){
  setOrb('speaking');
  setStatusCenter('🔊','');
  showAIBubble(text);

  if(!('speechSynthesis' in window)){afterSpeak();return;}
  window.speechSynthesis.cancel();
  loadVoices();

  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='en-US';utt.rate=0.92;utt.pitch=1.0;
  if(S.voice)utt.voice=S.voice;
  S.isTTS=true;

  // タイムアウト保険（文字数×80ms+2秒）
  clearTimeout(S.ttsTimer);
  const timeout=Math.max(3000, text.length*80+2000);
  S.ttsTimer=setTimeout(()=>{
    if(S.isTTS){S.isTTS=false;afterSpeak();}
  },timeout);

  utt.onend=()=>{clearTimeout(S.ttsTimer);S.isTTS=false;afterSpeak();};
  utt.onerror=()=>{clearTimeout(S.ttsTimer);S.isTTS=false;afterSpeak();};
  window.speechSynthesis.speak(utt);
}

function afterSpeak(){
  if(!S.active)return;
  startListening();
}

function showAIBubble(text){
  const wrap=document.getElementById('ai-bubble-wrap');
  document.getElementById('ai-text').textContent=text;
  document.getElementById('ai-text').classList.remove('show');
  document.getElementById('ai-tap-hint').classList.remove('hide');
  wrap.style.display='block';
}

function toggleAIText(){
  const t=document.getElementById('ai-text');
  const h=document.getElementById('ai-tap-hint');
  t.classList.toggle('show');
  h.classList.toggle('hide');
}

// ========================
// STT
// ========================
async function getMic(){
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true});s.getTracks().forEach(t=>t.stop());}catch(e){}
}

function startListening(){
  if(!S.active)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatusCenter('⚠️','Chrome/Edgeが必要です');return;}

  if(S.rec)try{S.rec.stop();}catch(e){}
  S.rec=new SR();
  S.rec.lang='en-US';S.rec.interimResults=true;S.rec.continuous=false;S.rec.maxAlternatives=1;

  S.rec.onstart=()=>{
    S.isRec=true;
    setOrb('listening');
    setStatusCenter('🎤','Speak now...');
    document.getElementById('mic-wave').classList.add('show');
    document.getElementById('mic-main').textContent='🎤 Your turn — speak now!';
    clearInterval(S.wt);
    S.wt=setInterval(()=>{for(let i=1;i<=6;i++){const b=document.getElementById('mw'+i);if(b)b.style.height=(3+Math.random()*13)+'px';}},80);
    // 12秒無音タイムアウト
    clearTimeout(S.silTimer);
    S.silTimer=setTimeout(()=>{
      if(S.isRec&&S.active){
        S.rec?.stop();
        const prompt="Take your time! Feel free to ask me anything.";
        speakAI(prompt);
        S.history.push({role:'assistant',content:prompt});
      }
    },12000);
  };

  S.rec.onresult=e=>{
    clearTimeout(S.silTimer);
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById('mic-main').textContent=interim||final||'...';
    if(final){
      S.isRec=false;
      stopRecClean();
      const spoken=final.trim();
      showUserBubble(spoken);
      S.history.push({role:'user',content:spoken});
      aiReply(spoken);
    }
  };

  S.rec.onerror=e=>{
    stopRecClean();
    if(e.error==='no-speech'&&S.active)setTimeout(()=>startListening(),1000);
    else setStatusCenter('⚠️',e.error);
  };
  S.rec.onend=()=>{if(S.isRec)stopRecClean();};
  try{S.rec.start();}catch(e){}
}

function stopRecClean(){
  clearInterval(S.wt);S.wt=null;S.isRec=false;
  clearTimeout(S.silTimer);
  document.getElementById('mic-wave').classList.remove('show');
}

function showUserBubble(text){
  const ub=document.getElementById('user-bubble-wrap');
  document.getElementById('user-bubble').textContent=text;
  ub.style.display='block';
  setTimeout(()=>{ub.style.display='none';},4000);
}

// ========================
// AI REPLY
// ========================
async function aiReply(userInput){
  if(!S.active)return;
  setOrb('thinking');
  setStatusCenter('💭','');
  document.getElementById('mic-main').textContent='AIが考えています...';

  const sys=`You are a ${S.sc.role}. ${S.sc.situation}
Rules: Respond naturally in English only. Keep it SHORT (1-3 sentences). Always ask a follow-up question. Be warm and encouraging. Do NOT break character.`;

  const msgs=S.history.map(h=>({role:h.role,content:h.content}));

  try{
    const res=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({max_tokens:150,system:sys,messages:msgs})
    });
    const data=await res.json();
    if(data.error){
      // エラー時は短い繋ぎの返答
      const fallback="That's interesting! Tell me more.";
      S.history.push({role:'assistant',content:fallback});
      speakAI(fallback);
      return;
    }
    const text=(data.content?.[0]?.text||'').trim();
    if(!text){startListening();return;}
    S.history.push({role:'assistant',content:text});
    speakAI(text);
  }catch(e){
    const fallback="Sorry, I didn't catch that. Could you say it again?";
    S.history.push({role:'assistant',content:fallback});
    speakAI(fallback);
  }
}

// ========================
// END & REPORT
// ========================
async function endConv(){
  if(!S.active)return;
  S.active=false;
  clearInterval(S.timerInt);
  clearTimeout(S.silTimer);clearTimeout(S.ttsTimer);clearInterval(S.wt);
  if(S.rec)try{S.rec.stop();}catch(e){}
  window.speechSynthesis?.cancel();

  showScreen('screen-report');
  document.getElementById('report-inner').innerHTML=`<div class="loading-rpt"><div class="spinner"></div><div>会話を分析中...</div><div style="font-size:11px;margin-top:6px;opacity:0.5">発音・文法・語彙・流暢さを評価しています</div></div>`;

  const dur=S.timerSec;
  const userMsgs=S.history.filter(h=>h.role==='user');
  const transcript=S.history.map(h=>`${h.role==='user'?'You':S.sc.role}: ${h.content}`).join('\n');

  const prompt=`You are an expert English speaking coach. Analyze this conversation and provide a JSON assessment.

Scenario: ${S.sc.name}
Duration: ${Math.floor(dur/60)}m ${dur%60}s
User turns: ${userMsgs.length}

Transcript:
${transcript}

Return ONLY this JSON (no markdown):
{
  "totalScore": <0-100>,
  "grade": "<A+/A/B+/B/C+/C/D/F>",
  "summary": "<2-3 sentences in Japanese summarizing performance>",
  "scores": {
    "fluency": {"score":<0-100>,"detail":"<Japanese feedback with specific examples>"},
    "pronunciation": {"score":<0-100>,"detail":"<Japanese feedback e.g. RとLの区別など具体例>"},
    "grammar": {"score":<0-100>,"detail":"<Japanese feedback with examples from transcript>"},
    "vocabulary": {"score":<0-100>,"detail":"<Japanese suggestions for better word choices>"}
  },
  "good": ["<specific good point 1 in Japanese>","<specific good point 2 in Japanese>"],
  "improve": ["<specific improvement 1 with example in Japanese>","<specific improvement 2 in Japanese>","<specific improvement 3 in Japanese>"]
}`;

  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({max_tokens:800,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.[0]?.text||'';
    const m=text.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('no json');
    renderReport(JSON.parse(m[0]),dur,userMsgs.length);
  }catch(e){
    renderReport({totalScore:70,grade:'B',summary:`${Math.floor(dur/60)}分${dur%60}秒の会話を完了しました。よく頑張りました！`,scores:{fluency:{score:70,detail:'会話を続けられました'},pronunciation:{score:65,detail:'全体的に聞き取れる発音でした'},grammar:{score:70,detail:'基本的な文法を使えています'},vocabulary:{score:68,detail:'状況に合った語彙を使えました'}},good:['会話を続けることができました','質問に答えることができました'],improve:['より多くの表現を試してみましょう','複雑な文構造にも挑戦してみてください','自信を持って話しましょう']},dur,userMsgs.length);
  }
}

function renderReport(r,dur,turns){
  const sc=S.sc;
  const cols={fluency:'#4d9fff',pronunciation:'#a78bfa',grammar:'#3ecf8e',vocabulary:'#f5a623'};
  const labels={fluency:'流暢さ',pronunciation:'発音',grammar:'文法',vocabulary:'語彙'};
  const ge={'A+':'🏆','A':'🥇','B+':'🥈','B':'🥈','C+':'🥉','C':'🥉','D':'💪','F':'💪'};
  document.getElementById('report-inner').innerHTML=`
    <div class="rpt-header">
      <div class="rpt-emoji">${ge[r.grade]||'📊'}</div>
      <div class="rpt-title">${sc.icon} ${sc.name}</div>
      <div class="rpt-meta">${Math.floor(dur/60)}分${dur%60}秒 ／ ${turns}回発言 ／ グレード ${r.grade}</div>
    </div>
    <div class="total-card">
      <div class="total-num">${r.totalScore}</div>
      <div class="total-label">総合スコア / 100点</div>
      <div class="total-summary">${r.summary}</div>
    </div>
    <div class="score-grid">
      ${Object.entries(r.scores).map(([k,v])=>`
        <div class="score-item">
          <div class="si-label">${labels[k]||k}</div>
          <div class="si-bar"><div class="si-fill" style="width:${v.score}%;background:${cols[k]}"></div></div>
          <div class="si-num" style="color:${cols[k]}">${v.score}</div>
          <div class="si-detail">${v.detail}</div>
        </div>`).join('')}
    </div>
    <div class="fb-card">
      <div class="fb-title">✅ 良かった点</div>
      ${(r.good||[]).map(g=>`<div class="fb-item g">${g}</div>`).join('')}
    </div>
    <div class="fb-card">
      <div class="fb-title">📈 改善ポイント</div>
      ${(r.improve||[]).map(i=>`<div class="fb-item i">${i}</div>`).join('')}
    </div>
    <div class="rpt-btns">
      <button class="btn-r" onclick="retry()">🔄 もう一度</button>
      <button class="btn-g" onclick="goHome()">🏠 ホームへ</button>
    </div>`;
}

// ========================
// HELPERS
// ========================
function setOrb(state){
  const el=document.getElementById('mic-orb');
  const map={idle:{e:'🎙',c:''},listening:{e:'🎤',c:'listening'},speaking:{e:'🔊',c:'speaking'},thinking:{e:'💭',c:'thinking'}};
  const s=map[state]||map.idle;
  el.textContent=s.e;el.className='mic-orb '+(s.c||'');
}
function setStatusCenter(icon,text){
  document.getElementById('status-icon').textContent=icon;
  document.getElementById('status-text').textContent=text;
}
function loadVoices(){
  S.voices=window.speechSynthesis.getVoices();
  S.voice=S.voices.find(v=>v.lang==='en-US'&&v.name.toLowerCase().includes('google'))
    ||S.voices.find(v=>v.lang==='en-US')
    ||S.voices.find(v=>v.lang.startsWith('en'))||null;
}
function showScreen(id){
  ['screen-home','screen-conv','screen-report'].forEach(s=>{
    const el=document.getElementById(s);
    el.style.display='none';el.classList.remove('active');
  });
  const el=document.getElementById(id);
  if(id==='screen-conv'){el.style.display='block';el.classList.add('active');}
  else if(id==='screen-report'){el.style.display='block';el.classList.add('active');}
  else el.style.display='flex';
}
function retry(){S.sc&&startConv();}
function goHome(){showScreen('screen-home');}

buildHome();
if('speechSynthesis' in window){window.speechSynthesis.onvoiceschanged=loadVoices;loadVoices();}
</script>
